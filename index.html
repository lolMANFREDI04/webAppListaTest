<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <meta name="description" content="Gestisci le tue attività con stile - Task Master PWA">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Task%20Master%22,%22short_name%22:%22Tasks%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22background_color%22:%22%230a0e27%22,%22theme_color%22:%22%236366f1%22,%22scope%22:%22/%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns=%27http://www.w3.org/2000/svg%27%20viewBox=%270%200%20192%20192%27%3E%3Crect%20fill=%27%236366f1%27%20width=%27192%27%20height=%27192%27/%3E%3Ctext%20x=%2750%25%27%20y=%2750%25%27%20font-size=%2780%27%20fill=%27white%27%20text-anchor=%27middle%27%20dy=%27.3em%27%3E✨%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22}]}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns=%27http://www.w3.org/2000/svg%27%20viewBox=%270%200%20100%20100%27%3E%3Crect%20fill=%27%236366f1%27%20width=%27100%27%20height=%27100%27%20rx=%2720%27/%3E%3Ctext%20x=%2750%25%27%20y=%2750%25%27%20font-size=%2760%27%20fill=%27white%27%20text-anchor=%27middle%27%20dy=%27.35em%27%3E✨%3C/text%3E%3C/svg%3E">
    <title>Task Master - Gestione Attività</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --success: #10b981;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-darker: #0a0e27;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --accent: #ec4899;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            animation: slideUp 0.6s ease-out;
        }

        input {
            flex: 1;
            padding: 14px 18px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.3);
            transform: translateY(-2px);
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        button {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--primary-light);
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.2);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .tasks-section h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: fadeIn 0.6s ease-out;
        }

        .task-item {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 12px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.3s ease;
            animation: slideUp 0.4s ease-out;
        }

        .task-item:hover {
            border-color: var(--primary-light);
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.15);
            transform: translateX(4px);
        }

        .task-item.completed {
            opacity: 0.6;
            border-color: var(--success);
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .checkbox {
            width: 24px;
            height: 24px;
            min-width: 24px;
            cursor: pointer;
            accent-color: var(--success);
        }

        .task-text {
            flex: 1;
            font-size: 1rem;
            color: var(--text-primary);
            word-break: break-word;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .btn-delete {
            padding: 8px 14px;
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .input-section {
                flex-direction: column;
            }

            .task-item {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Task Master</h1>
            <p class="subtitle">Gestisci le tue attività con stile</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total">0</div>
                <div class="stat-label">Totale</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completed">0</div>
                <div class="stat-label">Completate</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pending">0</div>
                <div class="stat-label">Rimanenti</div>
            </div>
        </div>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Aggiungi una nuova attività..." />
            <button onclick="addTask()">Aggiungi</button>
        </div>

        <div class="tasks-section">
            <h2>Le tue attività</h2>
            <div id="tasksList" class="tasks-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div class="empty-state-text">Nessuna attività ancora</div>
                    <p style="font-size: 0.9rem; color: var(--text-secondary);">Aggiungi una nuova attività per iniziare</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function updateStats() {
            const total = tasks.length;
            const completedCount = tasks.filter(t => t.completed).length;
            const pending = total - completedCount;

            document.getElementById('total').textContent = total;
            document.getElementById('completed').textContent = completedCount;
            document.getElementById('pending').textContent = pending;
        }

        function renderTasks() {
            const tasksList = document.getElementById('tasksList');
            
            if (tasks.length === 0) {
                tasksList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-text">Nessuna attività ancora</div>
                        <p style="font-size: 0.9rem; color: var(--text-secondary);">Aggiungi una nuova attività per iniziare</p>
                    </div>
                `;
                return;
            }

            tasksList.innerHTML = tasks.map((task, index) => `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <input type="checkbox" class="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${index})">
                    <span class="task-text">${escapeHtml(task.text)}</span>
                    <div class="task-actions">
                        <button class="btn-delete" onclick="deleteTask(${index})">Elimina</button>
                    </div>
                </div>
            `).join('');
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();

            if (!text) return;

            tasks.push({ text, completed: false });
            localStorage.setItem('tasks', JSON.stringify(tasks));
            input.value = '';

            renderTasks();
            updateStats();
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
            updateStats();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
            updateStats();
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });

        renderTasks();
        updateStats();

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'task-master-v1';
                const urlsToCache = ['/'];

                self.addEventListener('install', event => {
                    event.waitUntil(
                        caches.open(CACHE_NAME).then(cache => {
                            return cache.addAll(urlsToCache).catch(() => {});
                        })
                    );
                    self.skipWaiting();
                });

                self.addEventListener('activate', event => {
                    event.waitUntil(
                        caches.keys().then(cacheNames => {
                            return Promise.all(
                                cacheNames.map(cacheName => {
                                    if (cacheName !== CACHE_NAME) {
                                        return caches.delete(cacheName);
                                    }
                                })
                            );
                        })
                    );
                    self.clients.claim();
                });

                self.addEventListener('fetch', event => {
                    event.respondWith(
                        caches.match(event.request).then(response => {
                            return response || fetch(event.request).then(response => {
                                return caches.open(CACHE_NAME).then(cache => {
                                    cache.put(event.request, response.clone());
                                    return response;
                                });
                            });
                        }).catch(() => {
                            return caches.match('/');
                        })
                    );
                });
            `;

            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);

            navigator.serviceWorker.register(swUrl).then(reg => {
                console.log('✅ Service Worker registrato');
            }).catch(err => {
                console.log('Service Worker errore:', err);
            });
        }

        // PWA Install Prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('📱 PWA installabile');
        });

        // Notification su aggiunte (opzionale)
        function showNotification(message) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('Task Master', {
                    body: message,
                    icon: 'data:image/svg+xml,%3Csvg%20xmlns=%27http://www.w3.org/2000/svg%27%20viewBox=%270%200%20100%20100%27%3E%3Crect%20fill=%27%236366f1%27%20width=%27100%27%20height=%27100%27%20rx=%2720%27/%3E%3Ctext%20x=%2750%25%27%20y=%2750%25%27%20font-size=%2760%27%20fill=%27white%27%20text-anchor=%27middle%27%20dy=%27.35em%27%3E✨%3C/text%3E%3C/svg%3E'
                });
            }
        }

        // Richiedi permesso notifiche al caricamento
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    </script>
</body>
</html>
